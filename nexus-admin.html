<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AriseCore | Nexus Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #020203; color: #e2e8f0; font-family: 'JetBrains+Mono', monospace; }
        .cyber-card { background: #0a0a0f; border: 1px solid #1e1e26; border-radius: 12px; }
        .input-box { background: #050507; border: 1px solid #2d2d3d; color: white; padding: 10px; border-radius: 6px; width: 100%; font-size: 13px; }
        .input-box:focus { border-color: #8b5cf6; outline: none; }
        .btn-primary { background: #7c3aed; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-primary:hover:not(:disabled) { background: #6d28d9; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="auth-gate" class="max-w-md mx-auto mt-20 text-center cyber-card p-8">
        <h1 class="text-2xl font-bold text-violet-500 mb-6 tracking-tighter">NEXUS LOGIN</h1>
        <input type="password" id="pass" placeholder="Enter System Key..." class="input-box text-center mb-4">
        <button onclick="login()" class="btn-primary w-full py-3 rounded-lg text-sm uppercase tracking-widest">Access Terminal</button>
    </div>

    <div id="admin-panel" class="hidden max-w-6xl mx-auto animate-in fade-in duration-700">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-black text-white italic tracking-tighter">ARISE<span class="text-violet-500">CORE</span> ADMIN</h1>
                <p id="net-status" class="text-[10px] text-gray-500 uppercase tracking-[0.3em] mt-1">Status: Initializing...</p>
            </div>
            <button onclick="location.reload()" class="bg-red-900/10 text-red-500 border border-red-500/20 px-4 py-1 rounded text-[10px] hover:bg-red-500 hover:text-white transition">SHUTDOWN</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 cyber-card p-6 border-t-2 border-t-violet-600">
                <h3 class="text-sm font-bold mb-6 text-gray-400 uppercase tracking-widest">Deploy Module</h3>
                <div class="space-y-4">
                    <input type="text" id="m-name" placeholder="Module Name" class="input-box">
                    <input type="text" id="m-ver" placeholder="Version (1.21.4)" class="input-box">
                    <select id="m-cat" class="input-box">
                        <option value="Optimization">Optimization</option>
                        <option value="Visuals">Visuals</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Gameplay">Gameplay</option>
                    </select>
                    <textarea id="m-desc" placeholder="Description" class="input-box h-24 resize-none"></textarea>
                    <input type="text" id="m-url" placeholder="Download Link" class="input-box">
                    <input type="text" id="m-img" placeholder="Image URL" class="input-box">
                    <button onclick="addModule()" id="add-btn" class="btn-primary w-full py-3 rounded-lg text-xs tracking-widest">PUSH TO DATABASE</button>
                </div>
            </div>

            <div class="lg:col-span-2 cyber-card p-6">
                <h3 class="text-sm font-bold mb-6 text-gray-400 uppercase tracking-widest">Management Console</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead class="text-gray-600 border-b border-white/5 uppercase">
                            <tr>
                                <th class="pb-4 px-2">ID</th>
                                <th class="pb-4">Name</th>
                                <th class="pb-4">Category</th>
                                <th class="pb-4 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="module-list" class="divide-y divide-white/5">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FIXED URL (Matches your manual text) & API KEY
        const SB_URL = "https://zsdtlcyzhcfgcwqucdjd.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzZHRsY3l6aGNmZ2N3cXVjZGpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDY2MDYsImV4cCI6MjA5MDEyMjYwNn0.IgjMXn3NbVw5nt8CvrJksD4NTEr26nLGwdytUgWFLe0";

        const _supabase = window.supabase.createClient(SB_URL, SB_KEY);

        function login() {
            if(document.getElementById('pass').value === "VISHAL@2008") {
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('admin-panel').classList.remove('hidden');
                loadModules();
            } else { alert("INVALID KEY"); }
        }

        async function loadModules() {
            const status = document.getElementById('net-status');
            const list = document.getElementById('module-list');
            status.innerHTML = "Status: Syncing...";

            try {
                const { data, error } = await _supabase.from('Modules').select('*').order('id', { ascending: false });
                if(error) throw error;

                status.innerHTML = `Status: Online | Modules: ${data.length}`;
                list.innerHTML = data.map(m => `
                    <tr class="hover:bg-white/5 transition group">
                        <td class="py-4 px-2 text-gray-600">#${m.id}</td>
                        <td class="py-4 font-bold text-white">${m.name}</td>
                        <td class="py-4"><span class="bg-violet-900/20 text-violet-400 px-2 py-1 rounded-md text-[9px] uppercase">${m.category}</span></td>
                        <td class="py-4 text-right">
                            <button onclick="deleteMod(${m.id})" class="text-red-500/50 hover:text-red-500 transition px-2"><i class="fa-solid fa-trash-can"></i></button>
                        </td>
                    </tr>
                `).join('');
                
            } catch (err) {
                status.innerHTML = "Status: Offline - " + err.message;
                console.error(err);
            }
        }

        async function addModule() {
            const btn = document.getElementById('add-btn');
            const payload = {
                name: document.getElementById('m-name').value, // Matches your 'name' column
                version: document.getElementById('m-ver').value,
                category: document.getElementById('m-cat').value,
                description: document.getElementById('m-desc').value,
                download_url: document.getElementById('m-url').value,
                image_url: document.getElementById('m-img').value || ""
            };

            if(!payload.name || !payload.download_url) return alert("Fill Name and URL!");

            btn.disabled = true;
            btn.innerHTML = "PUSHING...";

            try {
                const { error } = await _supabase.from('Modules').insert([payload]);
                if(error) throw error;

                alert("Module Uplink Successful!");
                loadModules();
                document.querySelectorAll('.input-box').forEach(i => { if(i.tagName !== 'SELECT') i.value = ""; });
            } catch (err) {
                alert("Critical Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "PUSH TO DATABASE";
            }
        }

        async function deleteMod(numId) {
            if(confirm(`Delete Entry #${numId}?`)) {
                try {
                    const { error } = await _supabase.from('Modules').delete().eq('id', numId);
                    if(error) throw error;
                    loadModules();
                } catch (err) { alert(err.message); }
            }
        }
    </script>
</body>
</html>
