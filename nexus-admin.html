<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AriseCore | Nexus Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #020203; color: #e2e8f0; font-family: 'JetBrains+Mono', monospace; }
        .cyber-card { background: #0a0a0f; border: 1px solid #1e1e26; border-radius: 12px; }
        .input-box { background: #050507; border: 1px solid #2d2d3d; color: white; padding: 10px; border-radius: 6px; width: 100%; font-size: 13px; }
        .input-box:focus { border-color: #8b5cf6; outline: none; box-shadow: 0 0 10px rgba(139, 92, 246, 0.2); }
        .btn-primary { background: #7c3aed; font-weight: bold; transition: 0.3s; cursor: pointer; }
        .btn-primary:hover { background: #6d28d9; transform: scale(1.02); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="auth-gate" class="max-w-md mx-auto mt-20 text-center cyber-card p-8">
        <h1 class="text-2xl font-bold text-violet-500 mb-6 tracking-tighter">NEXUS LOGIN</h1>
        <input type="password" id="pass" placeholder="Enter System Key..." class="input-box text-center mb-4">
        <button onclick="login()" class="btn-primary w-full py-3 rounded-lg">Access Terminal</button>
    </div>

    <div id="admin-panel" class="hidden max-w-6xl mx-auto animate-in fade-in duration-700">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-black text-white italic">ARISE<span class="text-violet-500">CORE</span> ADMIN</h1>
                <p id="net-status" class="text-xs text-gray-500 uppercase tracking-widest mt-1"><span class="status-dot bg-yellow-500 mr-2"></span>Connecting to Satellite...</p>
            </div>
            <button onclick="location.reload()" class="bg-red-900/20 text-red-500 border border-red-500/30 px-6 py-2 rounded-full text-xs font-bold hover:bg-red-500 hover:text-white transition">SHUTDOWN</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 cyber-card p-6 border-l-4 border-l-violet-600">
                <h3 class="text-lg font-bold mb-6 flex items-center gap-2"><i class="fa-solid fa-plus-circle"></i> Deploy New Mod</h3>
                <div class="space-y-4">
                    <input type="text" id="m-name" placeholder="Module Name" class="input-box">
                    <input type="text" id="m-ver" placeholder="Version (e.g. 1.21)" class="input-box">
                    <select id="m-cat" class="input-box">
                        <option value="Optimization">Optimization</option>
                        <option value="Visuals">Visuals</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Gameplay">Gameplay</option>
                    </select>
                    <textarea id="m-desc" placeholder="Short Description" class="input-box h-24 resize-none"></textarea>
                    <input type="text" id="m-url" placeholder="Download URL (.jar)" class="input-box">
                    <input type="text" id="m-img" placeholder="Icon URL (Optional)" class="input-box">
                    <button onclick="addModule()" id="add-btn" class="btn-primary w-full py-3 rounded-lg mt-4 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-rocket"></i> PUSH TO DATABASE
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 cyber-card p-6">
                <h3 class="text-lg font-bold mb-6 flex items-center gap-2"><i class="fa-solid fa-database"></i> Live Modules</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="text-gray-500 border-b border-gray-800">
                            <tr>
                                <th class="pb-3">Name</th>
                                <th class="pb-3">Version</th>
                                <th class="pb-3">Category</th>
                                <th class="pb-3">Action</th>
                            </tr>
                        </thead>
                        <tbody id="module-list" class="divide-y divide-gray-800">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

   <script>
    // --- FIXED CONFIGURATION ---
    const SB_URL = "https://zsdtrlcyzhcfgcwqudjd.supabase.co"; // Fixed the 'r' typo
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzZHRsY3l6aGNmZ2N3cXVjZGpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDY2MDYsImV4cCI6MjA5MDEyMjYwNn0.IgjMXn3NbVw5nt8CvrJksD4NTEr26nLGwdytUgWFLe0";

    const _supabase = window.supabase.createClient(SB_URL, SB_KEY);

    // New Feature: Auto-Load on Login
    async function login() {
        const pass = document.getElementById('pass').value;
        if(pass === "VISHAL@2008") {
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('admin-panel').classList.remove('hidden');
            
            // Log successful connection
            console.log("Nexus Socket Optimized. Fetching modules...");
            loadModules(); 
        } else {
            alert("SYSTEM ERROR: Invalid Access Key");
        }
    }

    // New Feature: Dashboard View
    async function loadModules() {
        const listContainer = document.getElementById('module-list');
        listContainer.innerHTML = "<tr><td colspan='4' class='text-center py-4 opacity-50'>Scanning Database...</td></tr>";

        const { data, error } = await _supabase.from('Modules').select('*');

        if (error) {
            console.error("Sync Error:", error.message);
            return;
        }

        // Updates the table with live data
        listContainer.innerHTML = data.map(mod => `
            <tr class="border-b border-white/5 hover:bg-white/5 transition">
                <td class="py-3 font-bold text-violet-400">${mod.name}</td>
                <td class="py-3 text-gray-400 text-xs">${mod.version}</td>
                <td class="py-3"><span class="bg-gray-800 px-2 py-1 rounded text-[10px] uppercase">${mod.category}</span></td>
                <td class="py-3 text-right">
                    <button onclick="deleteMod(${mod.id})" class="text-red-500 hover:text-red-300 transition">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    // New Feature: Quick Delete
    async function deleteMod(id) {
        if(confirm("Confirm Deletion from AriseCore?")) {
            const { error } = await _supabase.from('Modules').delete().eq('id', id);
            if(!error) loadModules(); // Refresh list
        }
    }
</script>
</body>
</html>
