<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AriseCore | Nexus Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #050505; color: #e2e8f0; font-family: 'JetBrains+Mono', monospace; }
        .cyber-panel { background: rgba(10, 10, 15, 0.95); border: 1px solid rgba(139, 92, 246, 0.2); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .cyber-input { background: #0f172a; border: 1px solid #1e293b; padding: 12px; width: 100%; color: #f8fafc; border-radius: 6px; transition: 0.3s; font-size: 0.85rem; }
        .cyber-input:focus { border-color: #8b5cf6; box-shadow: 0 0 10px rgba(139, 92, 246, 0.3); outline: none; }
        .glow-btn { background: linear-gradient(135deg, #7c3aed, #4f46e5); transition: 0.4s; text-transform: uppercase; font-weight: bold; letter-spacing: 2px; }
        .glow-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 0 20px rgba(124, 58, 237, 0.6); }
        .terminal-text { color: #10b981; text-shadow: 0 0 5px rgba(16, 185, 129, 0.5); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="auth-gate" class="max-w-md w-full cyber-panel p-8 rounded-2xl text-center">
        <div class="mb-6 inline-block p-4 rounded-full bg-violet-500/10 text-violet-500 text-3xl">
            <i class="fa-solid fa-microchip"></i>
        </div>
        <h1 class="text-xl font-bold mb-2 tracking-tighter">NEXUS AUTHORIZATION</h1>
        <p class="text-gray-500 text-xs mb-6">RESTRICTED ACCESS: ARISE CORE INTERNAL</p>
        <input type="password" id="gate-key" placeholder="ENTER SYSTEM KEY" class="cyber-input text-center mb-4">
        <button onclick="unlock()" class="glow-btn w-full py-3 rounded-lg text-sm">Initialize Session</button>
        <p id="gate-err" class="text-red-500 text-[10px] mt-4 uppercase hidden">Access Denied: Ghost detected</p>
    </div>

    <div id="main-panel" class="max-w-2xl w-full cyber-panel p-8 rounded-2xl hidden animate-in fade-in duration-500">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h2 class="text-2xl font-black italic text-violet-400">CORE DEPLOYER</h2>
                <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em]">VishalMishra789 // v2.1</p>
            </div>
            <button onclick="location.reload()" class="text-[10px] text-red-400 hover:text-red-300 border border-red-900/30 px-3 py-1 rounded">ABORT SESSION</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] uppercase text-gray-400 mb-1 block">Module Name</label>
                    <input type="text" id="name" placeholder="BetterFPS" class="cyber-input">
                </div>
                <div>
                    <label class="text-[9px] uppercase text-gray-400 mb-1 block">Version Tag</label>
                    <input type="text" id="ver" placeholder="1.21.x" class="cyber-input">
                </div>
                <div>
                    <label class="text-[9px] uppercase text-gray-400 mb-1 block">Category</label>
                    <select id="cat" class="cyber-input bg-[#0f172a]">
                        <option value="Optimization">Optimization</option>
                        <option value="Visuals">Visuals</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Gameplay">Gameplay</option>
                    </select>
                </div>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] uppercase text-gray-400 mb-1 block">Description</label>
                    <textarea id="desc" placeholder="Briefly describe the module..." class="cyber-input h-[115px] resize-none"></textarea>
                </div>
            </div>
        </div>

        <div class="mt-6 space-y-4">
            <div>
                <label class="text-[9px] uppercase text-gray-400 mb-1 block">Download URL (.jar/zip)</label>
                <input type="text" id="d-url" placeholder="https://supabase.co/storage/..." class="cyber-input">
            </div>
            <div>
                <label class="text-[9px] uppercase text-gray-400 mb-1 block">Preview Icon URL</label>
                <input type="text" id="i-url" placeholder="Leave blank for default" class="cyber-input">
            </div>
        </div>

        <button onclick="pushData()" id="push-btn" class="glow-btn w-full py-4 mt-8 rounded-xl text-md flex items-center justify-center gap-3">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            Deploy Module
        </button>

        <div class="mt-8 bg-black/40 border border-white/5 p-4 rounded-lg">
            <div class="flex items-center gap-2 mb-2">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-[10px] uppercase text-gray-400">System Log</span>
            </div>
            <div id="status-log" class="text-[11px] font-mono text-gray-500 leading-relaxed">
                > Waiting for uplink input...
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SECRET = "VISHAL@2008";
        const SB_URL = "https://zsdtrlcyzhcfgcwqudjd.supabase.co";
        // PASTE YOUR LONG ANON KEY STARTING WITH eyJ HERE:
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzZHRsY3l6aGNmZ2N3cXVjZGpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDY2MDYsImV4cCI6MjA5MDEyMjYwNn0.IgjMXn3NbVw5nt8CvrJksD4NTEr26nLGwdytUgWFLe0"; 

        const _supabase = window.supabase.createClient(SB_URL, SB_KEY);

        function log(msg, isError = false) {
            const el = document.getElementById('status-log');
            const color = isError ? 'text-red-400' : 'terminal-text';
            el.innerHTML = `> <span class="${color}">${msg}</span>`;
        }

        function unlock() {
            if(document.getElementById('gate-key').value === SECRET) {
                document.getElementById('auth-gate').classList.add('hidden');
                document.getElementById('main-panel').classList.remove('hidden');
                log("Authorized session established. Handshaking with Supabase...");
            } else {
                document.getElementById('gate-err').classList.remove('hidden');
            }
        }

        async function pushData() {
            const btn = document.getElementById('push-btn');
            const data = {
                name: document.getElementById('name').value,
                version: document.getElementById('ver').value,
                category: document.getElementById('cat').value,
                description: document.getElementById('desc').value,
                download_url: document.getElementById('d-url').value,
                image_url: document.getElementById('i-url').value || "https://placeholder.com/64"
            };

            if(!data.name || !data.download_url) {
                log("Uplink Aborted: Missing required identification fields.", true);
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> ENCRYPTING...';
            log("Opening secure socket to 'Modules' table...");

            try {
                const { error } = await _supabase.from('Modules').insert([data]);

                if (error) {
                    log(`DATA REJECTED: ${error.message} (Check RLS & Table Name)`, true);
                    console.error(error);
                } else {
                    log(`DEPLOYMENT SUCCESSFUL: ${data.name} is now live.`);
                    // Reset fields
                    document.querySelectorAll('.cyber-input').forEach(i => i.value = (i.tagName === 'SELECT' ? i.value : ""));
                }
            } catch (err) {
                log(`CRITICAL NETWORK FAILURE: Fetch blocked by Browser/Provider.`, true);
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Deploy Module';
        }
    </script>
</body>
</html>
